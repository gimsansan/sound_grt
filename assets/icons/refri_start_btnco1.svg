<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" width="100%" height="100%">
  <defs>
    <linearGradient id="iceGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#73e0ef" />
      <stop offset="50%" stop-color="#81D4FA" />
      <stop offset="100%" stop-color="#29B6F6" />
    </linearGradient>
    
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#002244" flood-opacity="0.3"/>
    </filter>

    <g id="snowflake">
      <path d="M0,-8 L0,8 M-7,-4 L7,4 M-7,4 L7,-4" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
    </g>

    <style>
      .spin-slow { transform-origin: center; animation: spin 4s linear infinite; }
      .glimmer { animation: flash 2s infinite ease-in-out; }
      @keyframes spin { 100% { transform: rotate(360deg); } }
      @keyframes flash { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.9; } }
      /* 텍스트 스타일 추가 */
      .button-text {
        font-family: 'Pretendard', sans-serif;
        font-weight: bold;
        font-size: 22px;
        fill: white;
    
      }
    </style>
  </defs>

  <rect x="5" y="5" width="190" height="50" rx="25" fill="url(#iceGradient)" filter="url(#shadow)" />
  
  <g transform="translate(30, 30)" opacity="0.6">
    <use href="#snowflake" class="spin-slow glimmer" />
  </g>
  <g transform="translate(170, 30)" opacity="0.6">
    <use href="#snowflake" class="spin-slow glimmer" />
  </g>

  <text 
  x="100" 
  y="36" 
  text-anchor="middle" 
  dominant-baseline="middle" 
  class="button-text"
>시작</text>
</svg>